<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Vonerlec — Pointage BTP</title>
  <meta name="theme-color" content="#FF5A1F" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0D0E16; font-family: 'Barlow', sans-serif; color: #f0f0f0; }
    #root { min-height: 100%; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const _ACCESS = "Vk9Odm9uMSE=";
const SECRET = "VONERLEC_SECRET_2026";
const COULEURS = ["#FF5A1F","#4ECDC4","#F7B731","#7C5CBF","#26de81","#FC5C65","#45AAF2","#FD9644"];
const FIREBASE_URL = "https://vonerlec-badge-default-rtdb.europe-west1.firebasedatabase.app";

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
async function fbGet(path) {
  try { const r=await fetch(`${FIREBASE_URL}/${path}.json`); return await r.json(); } catch { return null; }
}
async function fbSet(path, value) {
  try { await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(value)}); } catch {}
}
async function fbPush(path, value) {
  try { const r=await fetch(`${FIREBASE_URL}/${path}.json`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(value)}); return await r.json(); } catch { return null; }
}
async function fbDelete(path) {
  try { await fetch(`${FIREBASE_URL}/${path}.json`,{method:"DELETE"}); } catch {}
}

// ─── STORAGE LOCAL ────────────────────────────────────────────────────────────
function loadLocal(key) { try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch{return null;} }
function saveLocal(key,value) { try{if(value===null)localStorage.removeItem(key);else localStorage.setItem(key,JSON.stringify(value));}catch{} }

// ─── DEVICE ANTI-TRICHE ───────────────────────────────────────────────────────
function getDeviceId() {
  let id=localStorage.getItem("vonerlec:deviceId");
  if(!id){id="dev_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem("vonerlec:deviceId",id);}
  return id;
}
function deviceDejaPointe(chantierId, type) {
  const today=new Date().toDateString();
  const hist=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");
  return hist.find(h=>h.deviceId===getDeviceId()&&h.chantierId===chantierId&&h.date===today&&h.type===type);
}
function enregistrerDevicePointage(chantierId, nomComplet, type) {
  const today=new Date().toDateString();
  const hist=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");
  const recent=hist.filter(h=>(new Date()-new Date(h.date))<30*24*3600*1000);
  recent.push({deviceId:getDeviceId(),chantierId,date:today,nom:nomComplet,type,ts:new Date().toISOString()});
  localStorage.setItem("vonerlec:device_pointage",JSON.stringify(recent));
}
// Retourne l'état du jour pour ce téléphone/chantier : null | "entree" | "les_deux"
function etatJourDevice(chantierId) {
  const today=new Date().toDateString();
  const hist=JSON.parse(localStorage.getItem("vonerlec:device_pointage")||"[]");
  const deviceId=getDeviceId();
  const todayEntries=hist.filter(h=>h.deviceId===deviceId&&h.chantierId===chantierId&&h.date===today);
  const hasEntree=todayEntries.some(h=>h.type==="entree");
  const hasSortie=todayEntries.some(h=>h.type==="sortie");
  if(hasEntree&&hasSortie) return "les_deux";
  if(hasEntree) return "entree";
  return null;
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function haversineDistance(lat1,lon1,lat2,lon2) {
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function generateToken(chantierId,version) {
  const str=`${chantierId}::v${version}::${SECRET}`;let h=5381;
  for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i);
  return Math.abs(h>>>0).toString(36).toUpperCase().padStart(8,"0");
}
function fmt(ts,mode="time") {
  const d=new Date(ts);
  if(mode==="time") return d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  if(mode==="date") return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"2-digit"});
  return d.toLocaleString("fr-FR");
}
function encodeQRData(ch) {
  const version=ch.qrVersion||1,token=generateToken(ch.id,version);
  return btoa(unescape(encodeURIComponent(JSON.stringify({i:ch.id,t:token,v:version,n:ch.nom,a:ch.adresse||"",la:ch.lat,lo:ch.lon,r:ch.rayon,c:ch.couleur}))));
}
function decodeQRData(hash) {
  try {
    if(!hash.startsWith("#badge/")) return null;
    const data=JSON.parse(decodeURIComponent(escape(atob(hash.replace("#badge/","")))));
    if(data.t!==generateToken(data.i,data.v)) return null;
    return {id:data.i,nom:data.n,adresse:data.a,lat:data.la,lon:data.lo,rayon:data.r,couleur:data.c,qrVersion:data.v};
  } catch{return null;}
}
function nomCle(nom,prenom) { return (nom+"_"+prenom).toUpperCase(); }

// ─── CSS ──────────────────────────────────────────────────────────────────────
const css=`
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#FF5A1F;border-radius:2px}
  input,select{outline:none;background:#1a1b2e;border:1.5px solid #2a2d4a;color:#f0f0f0;border-radius:8px;padding:10px 14px;font-family:'Barlow',sans-serif;font-size:15px;width:100%;transition:border-color .2s}
  input:focus,select:focus{border-color:#FF5A1F} input::placeholder{color:#444}
  button{cursor:pointer;font-family:'Barlow',sans-serif}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{0%{transform:scale(.85);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  @keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes ping{0%{transform:scale(1);opacity:1}75%,100%{transform:scale(2.2);opacity:0}}
  .anim{animation:fadeIn .35s ease forwards} .pop{animation:pop .45s ease forwards}
`;

// ─── COMPOSANTS BASE ──────────────────────────────────────────────────────────
function Btn({children,onClick,variant="primary",disabled,small,full,style:s}) {
  const base={display:"inline-flex",alignItems:"center",gap:8,justifyContent:"center",borderRadius:8,fontWeight:700,border:"none",cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"all .2s",padding:small?"8px 16px":"12px 22px",fontSize:small?13:15,width:full?"100%":undefined,...s};
  const v={primary:{background:"#FF5A1F",color:"#fff"},secondary:{background:"#1e2035",color:"#ccc",border:"1.5px solid #2a2d4a"},danger:{background:"#3a1515",color:"#fc5c65",border:"1.5px solid #fc5c6544"},success:{background:"#132a1f",color:"#26de81",border:"1.5px solid #26de8144"},ghost:{background:"transparent",color:"#777",border:"1.5px solid #2a2d4a"}};
  return <button style={{...base,...v[variant]}} onClick={disabled?undefined:onClick}>{children}</button>;
}
function Tag({color,children}) {
  return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,background:color+"22",color,fontSize:12,fontWeight:600,border:`1px solid ${color}44`}}>{children}</span>;
}
function Modal({children,onClose,width=520}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}} onClick={onClose}>
      <div className="anim" style={{background:"#13141f",borderRadius:16,padding:28,width:"100%",maxWidth:width,border:"1px solid #2a2d4a",maxHeight:"92vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}
function Toast({msg,sub,onClose}) {
  useEffect(()=>{const t=setTimeout(onClose,6000);return()=>clearTimeout(t);},[]);
  return (
    <div onClick={onClose} style={{position:"fixed",top:16,left:"50%",zIndex:2000,background:"#132a1f",border:"1.5px solid #26de81",borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",gap:14,minWidth:280,maxWidth:380,boxShadow:"0 8px 32px rgba(0,0,0,.6)",cursor:"pointer",animation:"slideDown .4s ease forwards"}}>
      <div style={{position:"relative",flexShrink:0}}>
        <div style={{width:10,height:10,borderRadius:"50%",background:"#26de81"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:"#26de81",animation:"ping 1.2s ease-out infinite"}}/>
      </div>
      <div><div style={{color:"#26de81",fontWeight:700,fontSize:14}}>{msg}</div>{sub&&<div style={{color:"#26de8199",fontSize:12,marginTop:2}}>{sub}</div>}</div>
      <div style={{marginLeft:"auto",color:"#26de8155",fontSize:20}}>×</div>
    </div>
  );
}

// ─── PAGE BADGEAGE ────────────────────────────────────────────────────────────
function BadgePage({chantier}) {
  const [nom,setNom]=useState("");
  const [prenom,setPrenom]=useState("");
  const [savedWorker,setSavedWorker]=useState(null);
  const [type,setType]=useState("entree");
  const [etatJour,setEtatJour]=useState(null); // null | "entree" | "les_deux"
  const [status,setStatus]=useState("form");
  const [error,setError]=useState("");
  const [result,setResult]=useState(null);

  useEffect(()=>{
    const w=loadLocal("vonerlec:identite");
    if(w?.nom&&w?.prenom){setSavedWorker(w);setNom(w.nom);setPrenom(w.prenom);}
    if(chantier){
      const etat=etatJourDevice(chantier.id);
      setEtatJour(etat);
      // Pré-sélectionner le bon type selon l'état du jour
      if(etat==="entree") setType("sortie");
      else setType("entree");
    }
  },[]);

  if(!chantier) return (
    <div style={{minHeight:"100vh",background:"#0D0E16",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{css}</style>
      <div style={{textAlign:"center",background:"#13141f",borderRadius:16,padding:28,border:"1px solid #fc5c6544",maxWidth:360}}>
        <div style={{fontSize:60,marginBottom:12}}>❌</div>
        <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#fc5c65",marginBottom:12}}>QR Code invalide</div>
        <div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Ce QR code a été désactivé.<br/><strong style={{color:"#aaa"}}>Demandez le nouveau QR à votre responsable.</strong></div>
      </div>
    </div>
  );

  // Journée terminée : a pointé arrivée ET départ
  if(etatJour==="les_deux") return (
    <div style={{minHeight:"100vh",background:"#0D0E16",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{css}</style>
      <div style={{textAlign:"center",background:"#13141f",borderRadius:16,padding:28,border:"1px solid #26de8133",maxWidth:360}}>
        <div style={{fontSize:60,marginBottom:12}}>✅</div>
        <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,color:"#26de81",marginBottom:8}}>Journée complète !</div>
        <div style={{color:"#666",fontSize:14,lineHeight:1.7}}>Vous avez pointé votre <strong style={{color:"#aaa"}}>arrivée et votre départ</strong> aujourd'hui sur <strong style={{color:"#FF5A1F"}}>{chantier.nom}</strong>.<br/>À demain ! 👋</div>
      </div>
    </div>
  );

  function pointer() {
    if(!nom.trim()||!prenom.trim()){setError("Entrez votre nom et prénom");return;}
    if(!navigator.geolocation){setError("GPS non disponible");return;}
    if(deviceDejaPointe(chantier.id,type)){
      setError(`⛔ Ce téléphone a déjà pointé ${type==="entree"?"l'arrivée":"le départ"} aujourd'hui.`);
      return;
    }
    setStatus("checking");setError("");
    navigator.geolocation.getCurrentPosition(pos=>{
      const dist=haversineDistance(pos.coords.latitude,pos.coords.longitude,chantier.lat,chantier.lon);
      if(dist>chantier.rayon){setStatus("form");setError(`⛔ Vous êtes à ${Math.round(dist)}m du chantier. Zone autorisée : ${chantier.rayon}m.`);return;}
      const nomComplet=nom.trim().toUpperCase()+" "+prenom.trim();
      saveLocal("vonerlec:identite",{nom:nom.trim().toUpperCase(),prenom:prenom.trim()});
      const p={id:Date.now(),chantierId:chantier.id,chantierNom:chantier.nom,nom:nom.trim().toUpperCase(),prenom:prenom.trim(),type,timestamp:new Date().toISOString(),distance:Math.round(dist)};
      enregistrerDevicePointage(chantier.id,nomComplet,type);
      fbPush("pointages",p).catch(()=>{});
      setResult(p);setStatus("success");
      // Mettre à jour l'état local
      setEtatJour(type==="entree"?"entree":"les_deux");
    },(err)=>{
      setStatus("form");
      if(err.code===1) setError("⛔ GPS refusé. Autorisez la localisation dans les paramètres.\n\nAndroid : Paramètres → Chrome → Autorisations → Localisation\niOS : Réglages → Safari → Localisation");
      else setError("GPS indisponible. Vérifiez que le GPS est activé.");
    },{enableHighAccuracy:true,timeout:15000});
  }

  const isEntree=type==="entree";
  const couleurType=isEntree?"#26de81":"#45aaf2";

  return (
    <div style={{minHeight:"100vh",background:"#0D0E16",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      {status==="success"?(
        <div className="pop" style={{textAlign:"center",maxWidth:380,width:"100%",background:"#13141f",borderRadius:16,padding:30,border:`1px solid ${couleurType}33`}}>
          <div style={{fontSize:80,marginBottom:8}}>{isEntree?"✅":"👋"}</div>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:36,color:couleurType,letterSpacing:2}}>{isEntree?"ARRIVÉE OK !":"DÉPART OK !"}</div>
          <div style={{color:"#aaa",marginTop:8,fontSize:15}}>Bonne {isEntree?"journée":"fin de journée"} <strong style={{color:"#fff"}}>{result.prenom} {result.nom}</strong> !</div>
          <div style={{marginTop:18,background:"#0D0E16",borderRadius:12,padding:"14px 18px",border:"1px solid #1e2035",textAlign:"left"}}>
            {[["Chantier",chantier.nom,null],["Type",isEntree?"🟢 Arrivée":"🔵 Départ",couleurType],["Heure",fmt(result.timestamp),"#f0f0f0"],["GPS",`✓ Validée (${result.distance}m)`,"#26de81"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:14}}>
                <span style={{color:"#666"}}>{l}</span><span style={{fontWeight:700,color:c||"#f0f0f0"}}>{v}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:18,background:"#0a0a12",borderRadius:10,padding:"14px 16px",border:"1px solid #2a2d4a",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>☝️</div>
            <div style={{color:"#888",fontSize:13,fontWeight:600}}>Fermez cet onglet manuellement</div>
            <div style={{color:"#444",fontSize:12,marginTop:4}}>Appuyez sur le bouton retour ou fermez l'onglet de votre navigateur</div>
          </div>
        </div>
      ):(
        <div style={{width:"100%",maxWidth:400}}>
          <div style={{background:chantier.couleur,padding:"18px 22px",borderRadius:"14px 14px 0 0"}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:2,opacity:.75,color:"#fff"}}>VONERLEC — POINTAGE</div>
            <div style={{fontFamily:"'Barlow Condensed'",fontSize:26,fontWeight:800,color:"#fff",lineHeight:1.1,marginTop:4}}>{chantier.nom}</div>
            {chantier.adresse&&<div style={{fontSize:12,opacity:.7,color:"#fff",marginTop:3}}>📍 {chantier.adresse}</div>}
          </div>
          <div style={{background:"#13141f",borderRadius:"0 0 14px 14px",padding:22,border:"1px solid #2a2d4a",borderTop:"none"}}>

            {/* CHOIX ENTRÉE / SORTIE — intelligent */}
            <div style={{display:"flex",gap:10,marginBottom:18}}>
              {[["entree","🟢 ARRIVÉE","#26de81"],["sortie","🔵 DÉPART","#45aaf2"]].map(([t,label,color])=>{
                const deja=etatJour==="entree"&&t==="entree"; // arrivée déjà faite
                return (
                  <button key={t} onClick={()=>{if(!deja){setType(t);setError("");}}}
                    style={{flex:1,padding:"14px 8px",borderRadius:10,border:`2px solid ${type===t&&!deja?color:deja?"#2a2d4a":"#2a2d4a"}`,background:deja?"#0a0a0a":type===t?color+"22":"#0D0E16",color:deja?"#333":type===t?color:"#555",fontWeight:800,fontSize:14,cursor:deja?"not-allowed":"pointer",transition:"all .2s",letterSpacing:1,position:"relative"}}>
                    {label}
                    {deja&&<div style={{fontSize:10,fontWeight:600,marginTop:3,color:"#444"}}>✓ déjà pointée</div>}
                  </button>
                );
              })}
            </div>

            {savedWorker?(
              <div style={{background:"#1a1030",borderRadius:10,padding:"12px 15px",marginBottom:16,border:"1px solid #3a1a5033",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:"#7C5CBF33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👤</div>
                <div><div style={{color:"#888",fontSize:12}}>Rebonjour !</div><div style={{fontWeight:700,fontSize:16}}>{savedWorker.prenom} {savedWorker.nom}</div></div>
                <button onClick={()=>{setSavedWorker(null);setNom("");setPrenom("");saveLocal("vonerlec:identite",null);}} style={{marginLeft:"auto",background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Ce n'est pas moi</button>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
                <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM DE FAMILLE</label><input value={nom} onChange={e=>setNom(e.target.value.toUpperCase())} placeholder="MARTIN" disabled={status==="checking"}/></div>
                <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>PRÉNOM</label><input value={prenom} onChange={e=>setPrenom(e.target.value)} placeholder="Julien" disabled={status==="checking"} onKeyDown={e=>e.key==="Enter"&&pointer()}/></div>
                <div style={{color:"#555",fontSize:12}}>💾 Votre nom sera mémorisé pour la prochaine fois</div>
              </div>
            )}

            <div style={{background:"#0D0E16",borderRadius:10,padding:"10px 14px",border:"1px solid #1e2035",marginBottom:14,fontSize:12,color:"#555",lineHeight:1.8}}>
              🛡️ <span style={{color:"#FF5A1F",fontWeight:700}}>Sécurité :</span> GPS vérifié dans {chantier.rayon}m · 1 arrivée + 1 départ max/jour
            </div>
            {error&&<div style={{background:"#2a1515",borderRadius:10,padding:"11px 14px",border:"1px solid #fc5c6533",color:"#fc5c65",fontSize:13,marginBottom:14,lineHeight:1.6,whiteSpace:"pre-line"}}>{error}</div>}
            <button onClick={pointer} disabled={status==="checking"} style={{width:"100%",padding:14,borderRadius:9,border:"none",background:status==="checking"?"#2a2a2a":couleurType,color:status==="checking"?"#fff":isEntree?"#0D0E16":"#fff",fontWeight:800,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:status==="checking"?"not-allowed":"pointer",letterSpacing:1}}>
              {status==="checking"?<><span style={{width:17,height:17,borderRadius:"50%",border:"2px solid #fff3",borderTopColor:isEntree?"#0D0E16":"#fff",display:"inline-block",animation:"spin .7s linear infinite"}}/>Vérification GPS...</>:isEntree?"🟢 POINTER MON ARRIVÉE":"🔵 POINTER MON DÉPART"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── QR MODAL ─────────────────────────────────────────────────────────────────
function QRModal({chantier,onClose,onChangeQR}) {
  const [confirming,setConfirming]=useState(false);
  const version=chantier.qrVersion||1;
  const link=`${window.location.href.split("#")[0]}#badge/${encodeQRData(chantier)}`;
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(link)}&margin=14&color=0D0E16&bgcolor=ffffff`;
  const changedAt=chantier.qrChangedAt?new Date(chantier.qrChangedAt).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"}):"—";
  return (
    <Modal onClose={onClose} width={440}>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:4}}>{chantier.nom}</div>
        <Tag color="#26de81">QR Code actif · Version {version}</Tag>
        <div style={{background:"#fff",borderRadius:14,padding:22,margin:"18px auto",display:"inline-block",border:`4px solid ${chantier.couleur}`,lineHeight:0}}>
          <img src={qrUrl} alt="QR" width={230} height={230} style={{borderRadius:6,display:"block"}}/>
        </div>
        <div style={{background:"#0D0E16",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,textAlign:"left"}}>
          {[["Statut","🟢 Actif","#26de81"],["Rayon GPS",`${chantier.rayon}m`,null],["Dernier changement",changedAt,"#F7B731"]].map(([l,v,c])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#666"}}>{l}</span><span style={{color:c||"#f0f0f0",fontWeight:c?700:400}}>{v}</span>
            </div>
          ))}
        </div>
        {!confirming?(
          <div style={{background:"#1a1010",borderRadius:10,padding:"12px 16px",marginBottom:16,border:"1px solid #fc5c6522",textAlign:"left"}}>
            <div style={{color:"#fc5c65",fontWeight:700,fontSize:13,marginBottom:6}}>🔄 Changer le QR code</div>
            <div style={{color:"#666",fontSize:12,lineHeight:1.6,marginBottom:10}}>L'ancien QR sera <strong style={{color:"#fc5c65"}}>immédiatement invalide</strong>.</div>
            <Btn full onClick={()=>setConfirming(true)} variant="danger" small>🔄 Générer un nouveau QR</Btn>
          </div>
        ):(
          <div style={{background:"#2a1010",borderRadius:10,padding:"14px 16px",marginBottom:16,border:"1px solid #fc5c65",textAlign:"left"}}>
            <div style={{color:"#fc5c65",fontWeight:700,marginBottom:8}}>⚠️ Êtes-vous sûr ?</div>
            <div style={{color:"#888",fontSize:13,marginBottom:14}}>L'ancien QR sera invalide <strong style={{color:"#fff"}}>immédiatement</strong>.</div>
            <div style={{display:"flex",gap:10}}>
              <Btn full onClick={()=>{onChangeQR(chantier.id);setConfirming(false);}} variant="danger">✅ Confirmer</Btn>
              <Btn full onClick={()=>setConfirming(false)} variant="ghost">Annuler</Btn>
            </div>
          </div>
        )}
        <Btn full onClick={()=>window.print()} variant="secondary" style={{marginBottom:8}}>🖨️ Imprimer le QR</Btn>
        <Btn full onClick={onClose} variant="ghost">Fermer</Btn>
      </div>
    </Modal>
  );
}

// ─── PRÉSENCE CHANTIER MODAL ─────────────────────────────────────────────────
function PresenceModal({chantier, pointages, onClose}) {
  const today=new Date().toDateString();
  const todayP=pointages.filter(p=>p.chantierId===chantier.id&&new Date(p.timestamp).toDateString()===today);
  const historiqueP=pointages.filter(p=>p.chantierId===chantier.id&&new Date(p.timestamp).toDateString()!==today);

  // Salariés présents aujourd'hui (ont pointé arrivée, pas encore de départ)
  const arrivees=todayP.filter(p=>p.type!=="sortie");
  const departs=new Set(todayP.filter(p=>p.type==="sortie").map(p=>nomCle(p.nom,p.prenom)));
  const presents=arrivees.filter(p=>!departs.has(nomCle(p.nom,p.prenom)));
  const partis=arrivees.filter(p=>departs.has(nomCle(p.nom,p.prenom)));

  // Salariés connus (ont pointé au moins 1 fois) mais absents aujourd'hui
  const connusKeys=new Set(historiqueP.map(p=>nomCle(p.nom,p.prenom)));
  const todayKeys=new Set(todayP.map(p=>nomCle(p.nom,p.prenom)));
  const absents=[...connusKeys].filter(k=>!todayKeys.has(k)).map(k=>{
    const last=historiqueP.filter(p=>nomCle(p.nom,p.prenom)===k).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
    return last;
  });

  return (
    <Modal onClose={onClose} width={460}>
      <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:4}}>{chantier.nom}</div>
      <div style={{color:"#666",fontSize:13,marginBottom:20}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long"})}</div>

      {presents.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{color:"#26de81",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:8}}>🟢 SUR LE CHANTIER ({presents.length})</div>
          {presents.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#132a1f",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #26de8122"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>👷</span>
                <div><div style={{fontWeight:700,fontSize:14}}>{p.prenom} {p.nom}</div><div style={{color:"#26de8199",fontSize:12}}>Arrivée à {fmt(p.timestamp)}</div></div>
              </div>
              <Tag color="#26de81">Présent</Tag>
            </div>
          ))}
        </div>
      )}

      {partis.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{color:"#45aaf2",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:8}}>🔵 PARTIS AUJOURD'HUI ({partis.length})</div>
          {partis.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0a1a2a",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #45aaf222"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>👋</span>
                <div><div style={{fontWeight:700,fontSize:14}}>{p.prenom} {p.nom}</div><div style={{color:"#45aaf299",fontSize:12}}>Parti à {fmt(todayP.find(x=>nomCle(x.nom,x.prenom)===nomCle(p.nom,p.prenom)&&x.type==="sortie")?.timestamp||p.timestamp)}</div></div>
              </div>
              <Tag color="#45aaf2">Parti</Tag>
            </div>
          ))}
        </div>
      )}

      {absents.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{color:"#555",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:8}}>⚫ CONNUS — ABSENTS AUJOURD'HUI ({absents.length})</div>
          {absents.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0D0E16",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid #2a2d4a"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20,opacity:.4}}>👷</span>
                <div><div style={{fontWeight:700,fontSize:14,color:"#555"}}>{p.prenom} {p.nom}</div><div style={{color:"#333",fontSize:12}}>Dernière venue : {fmt(p.timestamp,"date")}</div></div>
              </div>
              <Tag color="#444">Absent</Tag>
            </div>
          ))}
        </div>
      )}

      {presents.length===0&&partis.length===0&&absents.length===0&&(
        <div style={{textAlign:"center",padding:"30px 0",color:"#444",fontSize:14}}>Aucun salarié connu sur ce chantier pour l'instant</div>
      )}

      <Btn full onClick={onClose} variant="ghost" style={{marginTop:8}}>Fermer</Btn>
    </Modal>
  );
}

// ─── FORM CHANTIER ────────────────────────────────────────────────────────────
function ChantierForm({initial,onSave,onClose}) {
  const [form,setForm]=useState(initial||{nom:"",adresse:"",lat:"",lon:"",rayon:200,couleur:"#FF5A1F"});
  const [searchAdresse,setSearchAdresse]=useState(initial?.adresse||"");
  const [suggestions,setSuggestions]=useState([]);
  const [searchStatus,setSearchStatus]=useState(initial?.lat?"selected":"");
  const [gpsStatus,setGpsStatus]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  async function rechercherAdresse() {
    if(!searchAdresse.trim())return;setSearchStatus("loading");setSuggestions([]);
    try {
      const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(searchAdresse+" France")}&limit=5&lang=fr`);
      const data=await res.json();
      const results=(data.features||[]).map(f=>({label:[f.properties.name,f.properties.street,f.properties.city,f.properties.postcode].filter(Boolean).join(", "),lat:f.geometry.coordinates[1].toFixed(6),lon:f.geometry.coordinates[0].toFixed(6)}));
      if(results.length===1)choisirSuggestion(results[0]);
      else if(results.length>1){setSuggestions(results);setSearchStatus("ok");}
      else setSearchStatus("error");
    }catch{setSearchStatus("error");}
  }
  function choisirSuggestion(s){set("adresse",s.label);set("lat",s.lat);set("lon",s.lon);setSearchAdresse(s.label);setSuggestions([]);setSearchStatus("selected");}
  function useGPS(){
    if(!navigator.geolocation){setGpsStatus("unavailable");return;}setGpsStatus("loading");
    navigator.geolocation.getCurrentPosition(p=>{set("lat",p.coords.latitude.toFixed(6));set("lon",p.coords.longitude.toFixed(6));setGpsStatus("ok");},err=>setGpsStatus(err.code===1?"denied":"error"),{enableHighAccuracy:true,timeout:10000});
  }
  const coordsOk=form.lat&&form.lon;
  return (
    <Modal onClose={onClose}>
      <div style={{fontFamily:"'Barlow Condensed'",fontSize:22,fontWeight:700,marginBottom:20}}>{initial?.id?"✏️ Modifier":"➕ Nouveau chantier"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>NOM DU CHANTIER *</label><input value={form.nom} onChange={e=>set("nom",e.target.value)} placeholder="Résidence Les Pins"/></div>
        <div>
          <label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>🔍 RECHERCHE PAR ADRESSE</label>
          <div style={{display:"flex",gap:8}}>
            <input value={searchAdresse} onChange={e=>{setSearchAdresse(e.target.value);setSuggestions([]);setSearchStatus("");}} onKeyDown={e=>e.key==="Enter"&&rechercherAdresse()} placeholder="Ex: 12 Rue de la Paix, Lyon" style={{flex:1}}/>
            <button onClick={rechercherAdresse} disabled={searchStatus==="loading"||!searchAdresse.trim()} style={{background:"#FF5A1F",border:"none",borderRadius:8,color:"#fff",padding:"0 16px",fontSize:14,fontWeight:700,cursor:"pointer",flexShrink:0}}>
              {searchStatus==="loading"?"⏳":"🔍"}
            </button>
          </div>
          {searchStatus==="selected"&&<div style={{marginTop:6,background:"#132a1f",borderRadius:8,padding:"10px 14px",border:"1px solid #26de8133",fontSize:13,color:"#26de81"}}>✅ Adresse confirmée</div>}
          {suggestions.length>0&&<div style={{marginTop:6}}><div style={{color:"#F7B731",fontSize:12,marginBottom:5,fontWeight:700}}>👇 Cliquez sur votre adresse :</div><div style={{background:"#1a1b2e",borderRadius:8,border:"2px solid #FF5A1F",overflow:"hidden"}}>{suggestions.map((s,i)=><div key={i} onClick={()=>choisirSuggestion(s)} style={{padding:"12px 14px",cursor:"pointer",borderBottom:i<suggestions.length-1?"1px solid #2a2d4a":"none",fontSize:13,color:"#fff"}} onMouseEnter={e=>e.currentTarget.style.background="#FF5A1F22"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>📍 {s.label}</div>)}</div></div>}
          {searchStatus==="error"&&<div style={{color:"#F7B731",fontSize:12,marginTop:6}}>⚠️ Introuvable — essayez avec ville ou code postal</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:1,background:"#2a2d4a"}}/><span style={{color:"#444",fontSize:12}}>ou</span><div style={{flex:1,height:1,background:"#2a2d4a"}}/></div>
        <div>
          <label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>📍 GPS (si vous êtes sur le chantier)</label>
          <button onClick={useGPS} disabled={gpsStatus==="loading"} style={{width:"100%",background:"#1a1b2e",border:`1.5px solid ${gpsStatus==="ok"?"#26de81":gpsStatus==="denied"||gpsStatus==="error"?"#fc5c65":"#2a2d4a"}`,borderRadius:8,color:gpsStatus==="ok"?"#26de81":gpsStatus==="denied"||gpsStatus==="error"?"#fc5c65":"#aaa",padding:"11px 14px",fontSize:13,cursor:gpsStatus==="loading"?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {gpsStatus==="loading"&&<><span style={{display:"inline-block",animation:"spin .7s linear infinite"}}>🔄</span>Récupération...</>}
            {gpsStatus==="ok"&&<>✅ Position GPS récupérée !</>}
            {(gpsStatus==="denied"||gpsStatus==="error")&&<>❌ GPS indisponible</>}
            {(gpsStatus===""||gpsStatus==="unavailable")&&<>📍 Utiliser ma position actuelle</>}
          </button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:1,background:"#2a2d4a"}}/><span style={{color:"#444",fontSize:12}}>ou saisir manuellement</span><div style={{flex:1,height:1,background:"#2a2d4a"}}/></div>
        <div>
          <label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>LATITUDE & LONGITUDE</label>
          <div style={{display:"flex",gap:10}}>
            <input value={form.lat} onChange={e=>{set("lat",e.target.value);setSearchStatus(e.target.value?"selected":"");}} placeholder="Latitude  ex: 45.7640"/>
            <input value={form.lon} onChange={e=>{set("lon",e.target.value);setSearchStatus(e.target.value?"selected":"");}} placeholder="Longitude  ex: 4.8357"/>
          </div>
          <div style={{color:"#444",fontSize:11,marginTop:5}}>💡 Google Maps → clic droit → copier les coordonnées</div>
        </div>
        {coordsOk&&<div style={{background:"#132a1f",borderRadius:8,padding:"8px 14px",border:"1px solid #26de8133",display:"flex",alignItems:"center",gap:10,fontSize:13}}><span>🎯</span><span style={{color:"#26de81"}}>Position enregistrée</span><span style={{color:"#555",marginLeft:"auto",fontSize:12}}>{parseFloat(form.lat).toFixed(4)}, {parseFloat(form.lon).toFixed(4)}</span></div>}
        <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:6}}>RAYON AUTORISÉ (mètres)</label><input type="number" value={form.rayon} onChange={e=>set("rayon",e.target.value)} min={50} max={1000}/><div style={{color:"#444",fontSize:11,marginTop:4}}>100–200m classique · 300–500m grand terrain</div></div>
        <div><label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",marginBottom:10}}>COULEUR</label><div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{COULEURS.map(c=><div key={c} onClick={()=>set("couleur",c)} style={{width:32,height:32,borderRadius:8,background:c,cursor:"pointer",border:form.couleur===c?"3px solid #fff":"3px solid transparent",transform:form.couleur===c?"scale(1.15)":"scale(1)",transition:"all .15s"}}/>)}</div></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:22}}>
        <Btn full onClick={()=>{if(!form.nom){alert("Nom requis");return;}if(!form.lat||!form.lon){alert("Position GPS requise");return;}onSave({...form,id:initial?.id,lat:parseFloat(form.lat),lon:parseFloat(form.lon),rayon:parseInt(form.rayon)||200});}}>
          {initial?.id?"💾 Enregistrer":"✅ Créer le chantier"}
        </Btn>
        <Btn full onClick={onClose} variant="ghost">Annuler</Btn>
      </div>
    </Modal>
  );
}

            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:22}}>
              {[{l:"Chantiers",v:chantiers.length,i:"🏗️",c:"#FF5A1F"},{l:"Arrivées aujourd'hui",v:todayP.filter(p=>p.type!=="sortie").length,i:"🟢",c:"#26de81"},{l:"Départs aujourd'hui",v:todayP.filter(p=>p.type==="sortie").length,i:"🔵",c:"#45aaf2"},{l:"Total historique",v:pointages.length,i:"📆",c:"#F7B731"}].map((s,i)=>(
                <div key={i} style={{background:"#13141f",borderRadius:12,padding:"16px 18px",border:`1px solid ${s.c}22`}}>
                  <div style={{fontSize:24,marginBottom:6}}>{s.i}</div>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:38,color:s.c,lineHeight:1}}>{s.v}</div>
                  <div style={{color:"#555",fontSize:12,marginTop:3}}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#13141f",borderRadius:12,padding:20,border:"1px solid #1e2035"}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:18,fontWeight:700,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                👷 Activité aujourd'hui {todayP.length>0&&<Tag color="#26de81">{todayP.length} pointage{todayP.length>1?"s":""}</Tag>}
              </div>
              {todayP.length===0?<div style={{color:"#444",textAlign:"center",padding:"24px 0",fontSize:14}}>Aucun pointage aujourd'hui</div>
                :todayP.map(p=>{const ch=chantiers.find(c=>c.id===p.chantierId);const isSortie=p.type==="sortie";return(
                  <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#0D0E16",borderRadius:10,padding:"11px 14px",marginBottom:8,border:`1px solid ${isSortie?"#45aaf222":"#26de8122"}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:"50%",background:(ch?.couleur||"#FF5A1F")+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{isSortie?"👋":"👷"}</div>
                      <div><div style={{fontWeight:700}}>{p.prenom} {p.nom}</div><div style={{color:"#666",fontSize:12}}>{p.chantierNom}</div></div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <Tag color={isSortie?"#45aaf2":"#26de81"}>{isSortie?"Départ":"Arrivée"}</Tag>
                      <div style={{color:"#aaa",fontWeight:700,marginTop:4}}>{fmt(p.timestamp)}</div>
                    </div>
                  </div>
                );})}
            </div>
          </div>
        )}

        {tab==="chantiers"&&(
          <div className="anim">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>Chantiers & QR Codes</div>
              <Btn onClick={()=>setShowAdd(true)} disabled={chantiers.length>=10}>{chantiers.length>=10?"Max 10":"➕ Nouveau"}</Btn>
            </div>
            {chantiers.length===0&&<div style={{textAlign:"center",padding:"50px 20px",background:"#13141f",borderRadius:12,border:"1px dashed #2a2d4a",color:"#555"}}>Aucun chantier — créez-en un pour générer votre premier QR code</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
              {chantiers.map(ch=>{
                const chToday=todayP.filter(p=>p.chantierId===ch.id);
                const arrivees=chToday.filter(p=>p.type!=="sortie");
                const departs=new Set(chToday.filter(p=>p.type==="sortie").map(p=>nomCle(p.nom,p.prenom)));
                const presents=arrivees.filter(p=>!departs.has(nomCle(p.nom,p.prenom)));
                const ver=ch.qrVersion||1;
                return(
                  <div key={ch.id} style={{background:"#13141f",borderRadius:12,overflow:"hidden",border:"1px solid #1e2035"}}>
                    <div style={{background:ch.couleur,padding:"13px 17px"}}>
                      <div style={{fontFamily:"'Barlow Condensed'",fontSize:20,fontWeight:800,color:"#fff"}}>{ch.nom}</div>
                      <div style={{fontSize:12,color:"#ffffff77",marginTop:2}}>📍 {ch.adresse||"Sans adresse"}</div>
                    </div>
                    <div style={{padding:"14px 16px"}}>
                      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                        <Tag color={ch.couleur}>📡 {ch.rayon}m</Tag>
                        <Tag color="#26de81">🟢 {presents.length} présent{presents.length>1?"s":""}</Tag>
                        <Tag color="#F7B731">QR v{ver}</Tag>
                      </div>
                      {/* Liste présents */}
                      {presents.length>0&&(
                        <div style={{marginBottom:10}}>
                          {presents.slice(0,3).map(p=>(
                            <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #1e2035"}}>
                              <span style={{width:8,height:8,borderRadius:"50%",background:"#26de81",flexShrink:0,display:"inline-block"}}/>
                              <span style={{fontSize:13,fontWeight:600}}>{p.prenom} {p.nom}</span>
                              <span style={{marginLeft:"auto",fontSize:12,color:"#26de8199"}}>{fmt(p.timestamp)}</span>
                            </div>
                          ))}
                          {presents.length>3&&<div style={{color:"#555",fontSize:12,marginTop:4}}>+{presents.length-3} autre{presents.length-3>1?"s":""}</div>}
                        </div>
                      )}
                      <div style={{display:"flex",gap:8}}>
                        <Btn small full onClick={()=>setShowPresence(ch)}>👥 Présences</Btn>
                        <Btn small full onClick={()=>setShowQR(ch)}>📱 QR</Btn>
                        <Btn small onClick={()=>setEditItem(ch)} variant="ghost">✏️</Btn>
                        <Btn small onClick={()=>{if(window.confirm("Supprimer ce chantier ?"))onDeleteChantier(ch.id);}} variant="danger">🗑️</Btn>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="pointages"&&(
          <div className="anim">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
              <div style={{fontFamily:"'Barlow Condensed'",fontSize:24,fontWeight:800}}>Historique des pointages</div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <Tag color="#FF5A1F">{pointages.length} entrée{pointages.length>1?"s":""}</Tag>
                <Btn small onClick={()=>setShowManuel(true)} variant="secondary">✏️ Saisie manuelle</Btn>
                <Btn small onClick={()=>{if(window.confirm("Supprimer les pointages d'aujourd'hui ?"))onClearToday();}} variant="danger">🗑️ Vider aujourd'hui</Btn>
                <Btn small onClick={()=>{if(window.confirm("⚠️ ATTENTION : supprimer TOUS les pointages ?\nCette action est irréversible."))onClearAll();}} variant="danger">🗑️ Tout supprimer</Btn>
              </div>
            </div>
            {pointages.length===0
              ?<div style={{textAlign:"center",padding:"60px 20px",background:"#13141f",borderRadius:12,border:"1px dashed #2a2d4a",color:"#555"}}>Aucun pointage pour l'instant</div>
              :<div style={{background:"#13141f",borderRadius:12,border:"1px solid #1e2035",overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:540}}>
                  <thead><tr style={{background:"#0D0E16"}}>{["Date","Heure","Type","Salarié","Chantier","GPS",""].map(h=><th key={h} style={{padding:"11px 14px",textAlign:"left",color:"#555",fontSize:11,fontWeight:700,letterSpacing:1,borderBottom:"1px solid #1e2035"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {pointages.map((p,i)=>{const ch=chantiers.find(c=>c.id===p.chantierId);const isSortie=p.type==="sortie";return(
                      <tr key={p.id} style={{borderBottom:"1px solid #16172022",background:i%2?"#0a0b12":"transparent"}}>
                        <td style={{padding:"10px 14px",color:"#666",fontSize:13}}>{fmt(p.timestamp,"date")}</td>
                        <td style={{padding:"10px 14px",fontWeight:700}}>{fmt(p.timestamp)}</td>
                        <td style={{padding:"10px 14px"}}><Tag color={isSortie?"#45aaf2":"#26de81"}>{isSortie?"🔵 Départ":"🟢 Arrivée"}</Tag></td>
                        <td style={{padding:"10px 14px",fontWeight:600}}>{p.prenom} {p.nom}</td>
                        <td style={{padding:"10px 14px"}}><span style={{width:8,height:8,borderRadius:"50%",background:ch?.couleur||"#666",display:"inline-block",marginRight:7}}/><span style={{fontSize:13}}>{p.chantierNom}</span></td>
                        <td style={{padding:"10px 14px"}}>{p.manuel?<Tag color="#F7B731">Manuel</Tag>:<Tag color={p.distance<100?"#26de81":"#F7B731"}>{p.distance}m</Tag>}</td>
                        <td style={{padding:"10px 14px"}}><Btn small onClick={()=>{if(window.confirm("Supprimer ?"))onDeletePointage(p.id);}} variant="danger">🗑️</Btn></td>
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
            }
          </div>
        )}
      </div>

      {showQR&&<QRModal chantier={showQR} onClose={()=>setShowQR(null)} onChangeQR={id=>{onChangeQR(id);}}/>}
      {showPresence&&<PresenceModal chantier={showPresence} pointages={pointages} onClose={()=>setShowPresence(null)}/>}
      {showAdd&&<ChantierForm initial={null} onSave={d=>{onSaveChantier(d);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
      {editItem&&<ChantierForm initial={editItem} onSave={d=>{onSaveChantier(d);setEditItem(null);}} onClose={()=>setEditItem(null)}/>}
      {showManuel&&<SaisieManuelleModal chantiers={chantiers} onSave={p=>{onAddManuel(p);setShowManuel(false);}} onClose={()=>setShowManuel(false)}/>}
    </div>
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function AccesPage({onLogin}) {
  const [pw,setPw]=useState(""),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
  async function go(){setLoading(true);setErr("");await new Promise(r=>setTimeout(r,400));if(btoa(pw)===_ACCESS){saveLocal("vonerlec:session","ok");onLogin();}else{setErr("Mot de passe incorrect");setLoading(false);}}
  return (
    <div style={{minHeight:"100vh",background:"#0D0E16",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{css}</style>
      <div className="anim" style={{textAlign:"center",maxWidth:340,width:"100%"}}>
        <div style={{fontSize:60,marginBottom:6}}>🏗️</div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:46,color:"#FF5A1F",letterSpacing:4,lineHeight:1}}>VONERLEC</div>
        <div style={{color:"#444",marginBottom:34,fontSize:13,letterSpacing:1}}>TABLEAU DE BORD</div>
        <div style={{background:"#13141f",borderRadius:14,padding:24,border:"1px solid #1e2035"}}>
          <label style={{color:"#666",fontSize:11,letterSpacing:1,display:"block",textAlign:"left",marginBottom:8}}>CODE D'ACCÈS</label>
          <input type="text" style={{WebkitTextSecurity:"disc",letterSpacing:4}} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" style={{marginBottom:8}} autoFocus/>
          {err&&<div style={{color:"#fc5c65",fontSize:13,marginBottom:10,textAlign:"left"}}>⚠️ {err}</div>}
          <button onClick={go} disabled={loading||!pw} style={{width:"100%",padding:13,borderRadius:8,border:"none",background:loading||!pw?"#1e2035":"#FF5A1F",color:loading||!pw?"#444":"#fff",fontWeight:700,fontSize:15,cursor:loading||!pw?"not-allowed":"pointer",marginTop:6}}>
            {loading?"...":"ACCÉDER →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState("loading");
  const [chantiers,setChantiers]=useState([]);
  const [pointages,setPointages]=useState([]);
  const [nextId,setNextId]=useState(100);
  const [badgeChantier,setBadgeChantier]=useState(null);

  async function loadAll(){
    // Chantiers depuis Firebase (partagés entre appareils admin)
    const rawC=await fbGet("chantiers");
    const c=rawC?Object.values(rawC):[]; 
    setChantiers(c);
    // nextId = max id existant + 1
    if(c.length>0){const maxId=Math.max(...c.map(x=>x.id||0));setNextId(maxId+1);}
    // Pointages depuis Firebase
    const raw=await fbGet("pointages");
    const p=raw?Object.values(raw).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)):[];
    setPointages(p);return{c,p};
  }

  useEffect(()=>{
    const chantierFromQR=decodeQRData(window.location.hash);
    if(chantierFromQR){setBadgeChantier(chantierFromQR);setView("badge");return;}
    const session=loadLocal("vonerlec:session");
    if(session==="ok"){loadAll().then(()=>setView("admin"));}
    else{loadAll().then(()=>setView("login"));}
  },[]);

  const persistC=async l=>{setChantiers(l);await fbSet("chantiers",l.reduce((acc,c)=>{acc[c.id]=c;return acc;},{}));};
  const persistP=async l=>{setPointages(l);await fbSet("pointages",l.reduce((acc,p,i)=>{acc[p.id||i]=p;return acc;},{}));};

  function handleSaveChantier(d){
    let l;
    if(d.id){l=chantiers.map(c=>c.id===d.id?{...d,qrVersion:c.qrVersion||1,qrChangedAt:c.qrChangedAt}:c);}
    else{const newId=chantiers.length>0?Math.max(...chantiers.map(x=>x.id||0))+1:100;l=[...chantiers,{...d,id:newId,qrVersion:1,qrChangedAt:new Date().toISOString()}];setNextId(newId+1);}
    persistC(l);
  }
  function handleChangeQR(chantierId){persistC(chantiers.map(c=>c.id===chantierId?{...c,qrVersion:(c.qrVersion||1)+1,qrChangedAt:new Date().toISOString()}:c));}
  async function handleAddManuel(p){const updated=[p,...pointages].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));await persistP(updated);}
  async function handleClearAll(){await fbDelete("pointages");setPointages([]);}
  async function handleClearToday(){
    const today=new Date().toDateString();
    const kept=pointages.filter(p=>new Date(p.timestamp).toDateString()!==today);
    await persistP(kept);
  }

  if(view==="loading") return <div style={{minHeight:"100vh",background:"#0D0E16",display:"flex",alignItems:"center",justifyContent:"center"}}><style>{css}</style><div style={{fontFamily:"'Bebas Neue'",fontSize:28,color:"#FF5A1F",letterSpacing:4}}>VONERLEC...</div></div>;
  if(view==="badge") return <BadgePage chantier={badgeChantier}/>;
  if(view==="login") return <AccesPage onLogin={()=>{loadAll();setView("admin");}}/>;

  return <AdminApp
    chantiers={chantiers} pointages={pointages}
    onSaveChantier={handleSaveChantier}
    onDeleteChantier={async id=>{const u=chantiers.filter(c=>c.id!==id);await persistC(u);}}
    onDeletePointage={async id=>{const u=pointages.filter(p=>p.id!==id);await persistP(u);setPointages(u);}}
    onChangeQR={handleChangeQR}
    onLogout={()=>{saveLocal("vonerlec:session",null);setView("login");}}
    onRefresh={loadAll}
    onAddManuel={handleAddManuel}
    onClearAll={handleClearAll}
    onClearToday={handleClearToday}
  />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
